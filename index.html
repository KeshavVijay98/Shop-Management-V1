<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav id="home">
            <div class="nav">
                <h1 class="logo">VK</h1>
                <div class="navlinks">
                    <a href="#home">Home</a>
                    <a href="#dashboard">Dashboard</a>
                    <a href="#product">Product form</a>
                    <a href="#inventory">Inventory table</a>
                    <a href="#billing">Billing</a>
                </div>

                <div>
                    <button class="auth">Sign In</button>
                    <button class="auth">Sign Up</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="dashboard">
            <div class="tproducts">
                <span class="fa-solid fa-box"></span>
                <div><h2>Total Products</h2> <p>213</p><br/>All available products </div>
            </div>

            <div class="tpstock">
                <span class="fa-solid fa-boxes-stacked"></span>
                <div><h2> Total Product Stocks</h2> <p>810</p><br/></div>
            </div>
        </div>
    </main>
</body>
</html>
