<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Management System</title>
   -\
++ <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav id="home">
            <div class="nav">
                <h1 class="logo">VK</h1>
                <div class="navlinks">
                    <a href="#home">Home</a>
                    <a href="#dashboard">Dashboard</a>
                    <a href="#product-form">Product form</a>
                    <a href="#inventory">Inventory table</a>
                    <a href="#billing">Billing</a>
                </div>
                <div class="auth-button">
                    <button class="auth">Sign In</button>
                    <button class="auth">Sign Up</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="dashboard" id="dashboard">
            <div class="card">
                <span class="fa-solid fa-box"></span>
                <div><h2>Total Products</h2> <p>213</p> <p>Product in shop</p> </div>
            </div>
            <div class="card">
                <span class="fa-solid fa-boxes-stacked"></span>
                <div><h2> Total Stock Quantity</h2> <p>810</p> <p>Total unit available</p> </div>
            </div>
            <div class="card">
                <span class="fa-solid fa-box-open"></span>
                <div><h2>Low Stock</h2> <p>35</p> <p>Product running low</p></div>
            </div>
            <div class="card">
                <span class="fa-solid fa-ban"></span>
                <div><h2>Out Of Stock</h2
                    > <p>23</p> <p>Items unavailable</p> </div>
            </div>
        </div>
        
        
        <form class="formm" id="product-form">
            <div class="field">
                <label for="productName">Product Name</label>
                <div class="sub-field">
                    <input type="text" name="productName" id="productName" placeholder="Product Name">
                </div>
            </div>

            <div class="field">
                <label for="productQuantity">Product Quantity</label>
                <div class="sub-field">
                    <input type="number" name="productQuantity" id="productQuantity" placeholder="Product Quantity">
                    <select name="productUnit" id="productUnit" required>
                        <option value="" selected disabled>Select Unit</option>
                        <option value="L">L</option>
                        <option value="Kg">Kg</option>
                        <option value="packets">packets</option>
                        <option value="g">g</option>
                    </select>
                </div>
            </div>
        
            <div class="field">
                <label for="productPrice">Product Price</label>
                <div class="sub-field">
                    <span class="fa-solid fa-indian-rupee-sign"></span>
                    <input type="number" name="productPrice" id="productPrice" placeholder="Product Price">
                </div>
            </div>
                
            <button type="submit">Add Product</button>      
        </form>

        <table class="p-table">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                </tr>
            </thead>

            <tbody id="p-t-body">
            </tbody>
        </table>
    </main>
    <script src="script.js"></script>
</body>
</html>
